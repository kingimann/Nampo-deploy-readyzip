name: okayspace_api
description: Dart client for the OkaySpace FastAPI backend. Mirrors the React client.ts (same /api base, Bearer session token, error envelope). Use from a Flutter app.
version: 0.1.0
publish_to: none

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  http: ^1.2.0
  meta: ^1.11.0

dev_dependencies:
  lints: ^4.0.0
  test: ^1.25.0

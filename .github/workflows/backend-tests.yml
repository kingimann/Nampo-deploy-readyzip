name: Backend API contract

# Guards the OpenAPI contract for the money surface: every typed endpoint must
# keep declaring a 200 response schema (API-improvement guide §1/§10), so an
# accidental `response_model` drop fails here instead of silently breaking SDK
# codegen. Pure unit test — no database or running server required.

on:
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-tests.yml"
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-tests.yml"

jobs:
  openapi-contract:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest
      - name: OpenAPI money contract
        run: python -m pytest tests/test_openapi_money_contract.py -q

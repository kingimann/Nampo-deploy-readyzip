# Render Blueprint — provisions a Postgres database and deploys the FastAPI
# backend automatically. Render reads this file when you create a "Blueprint"
# from your repo.  Docs: https://render.com/docs/blueprint-spec
#
# The backend stores everything in Postgres (see backend/db.py — a Mongo-style
# wrapper over a JSONB table per collection). It connects using DATABASE_URL.

databases:
  - name: nampo-db
    plan: free            # free Postgres (expires after 30 days — upgrade to keep)
    databaseName: nampo
    user: nampo

services:
  - type: web
    name: nampo-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      # Wire the managed Postgres connection string straight into the app.
      - key: DATABASE_URL
        fromDatabase:
          name: nampo-db
          property: connectionString
      - key: CORS_ORIGINS
        value: "*"
      # Comma-separated emails that are auto-granted the site admin role (can
      # verify users, set mod/admin roles, and moderate posts). Set yours here.
      - key: ADMIN_EMAILS
        sync: false
      # Optional — only needed for Foursquare place matching. Render will prompt
      # you to paste it (sync:false keeps it out of git); leave blank to skip.
      - key: FSQ_API_KEY
        sync: false
      # Optional — real payouts via Stripe Connect. Leave blank to keep test
      # payments. See backend/STRIPE_SETUP.md.
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: PLATFORM_FEE_PERCENT
        value: "0"
      - key: WEB_APP_URL
        value: https://nampo-web.onrender.com
      # Automated payouts: minimum balance to pay, and a secret a Render Cron Job
      # can send as the `X-Cron-Key` header to POST /api/payouts/run.
      - key: MIN_PAYOUT
        value: "1"
      - key: CRON_SECRET
        sync: false

  # Web frontend — the Expo app exported to a static site. Optional: mobile is
  # built separately with EAS. The web client calls the API cross-origin using
  # EXPO_PUBLIC_BACKEND_URL (the backend allows CORS), so no proxy is needed.
  - type: web
    runtime: static
    name: nampo-web
    # NOTE: static sites have no `plan` field — they're free. Adding one fails
    # blueprint sync with "no such plan free for service type web".
    # Install with Yarn (this repo's declared packageManager) — npm ci crashes
    # here with "Exit handler never called!" (an npm 10/11 bug). Corepack ships
    # with Node 20 and provides yarn@1.22.22 from package.json's packageManager.
    buildCommand: cd frontend && corepack enable && yarn install --network-timeout 1000000 && npx expo export -p web
    staticPublishPath: frontend/dist
    pullRequestPreviewsEnabled: false
    envVars:
      # Expo SDK 54 requires Node >= 20.19.4.
      - key: NODE_VERSION
        value: "20.19.4"
      # Baked into the web build at export time. The backend URL is not secret,
      # so hardcode it here (the API service is named nampo-backend). If you
      # rename the API service, update this. The Mapbox PUBLIC token is bundled
      # too; paste it in the dashboard (sync:false) since it shouldn't live in git.
      - key: EXPO_PUBLIC_BACKEND_URL
        value: https://nampo-backend.onrender.com
      - key: EXPO_PUBLIC_MAPBOX_TOKEN
        sync: false
      # Optional: Cloudinary CDN for media (esp. video). When both are set, the
      # app uploads files to Cloudinary and stores only the URL instead of
      # embedding base64 in the database. Paste in the dashboard (sync:false).
      - key: EXPO_PUBLIC_CLOUDINARY_CLOUD_NAME
        sync: false
      - key: EXPO_PUBLIC_CLOUDINARY_UPLOAD_PRESET
        sync: false
    routes:
      # SPA fallback — the app exports a single index.html (web.output: single).
      - type: rewrite
        source: /*
        destination: /index.html

# AWS App Runner config (used when deploying from SOURCE, not from an image).
# If you deploy a prebuilt Docker image from ECR instead, App Runner ignores
# this file and uses the Dockerfile / image directly.
version: 1.0
runtime: python311
build:
  commands:
    build:
      - pip install -r requirements.txt
run:
  runtime-version: 3.11
  command: uvicorn server:app --host 0.0.0.0 --port 8080
  network:
    port: 8080
  env:
    - name: PORT
      value: "8080"
  # NOTE: secrets are NOT set here. Configure them in the App Runner console
  # under "Environment variables" or via Secrets Manager. At minimum set:
  #   DATABASE_URL      — your Postgres DSN
  #   MESSAGE_ENC_KEY   — any strong, STABLE random string. This turns on
  #                       at-rest encryption of message content (text, voice
  #                       notes, files, transcripts, place/contact, polls).
  #                       Keep it constant and backed up — if it changes, older
  #                       encrypted messages can't be decrypted. (On Render this
  #                       is auto-generated via render.yaml's generateValue.)

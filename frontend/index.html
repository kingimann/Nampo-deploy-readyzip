<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"
    />
    <title>OkaySpace</title>
    <style>
      html,
      body,
      #root {
        height: 100%;
        margin: 0;
        background: #0a0a0a;
      }
      /* react-native-web needs the root to be a flex container that fills the
         viewport, otherwise the app collapses to 0 height (blank screen). */
      #root {
        display: flex;
        flex-direction: column;
      }
      /* react-native-web resets */
      body {
        overflow: hidden;
        -webkit-font-smoothing: antialiased;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/web/main.tsx"></script>
  </body>
</html>
